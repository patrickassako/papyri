version: '3.8'

services:
  # Meilisearch - Fast, typo-tolerant search engine
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: papyri-meilisearch
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:-ChangeMe123456789}
      MEILI_ENV: ${NODE_ENV:-development}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - papyri-network

volumes:
  meilisearch_data:
    driver: local

networks:
  papyri-network:
    driver: bridge
